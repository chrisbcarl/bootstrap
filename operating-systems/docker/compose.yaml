services:
  windows:
    image: dockurr/windows
    container_name: windows
    environment:
      VERSION: "10"
      DISK_SIZE: "128G"
      RAM_SIZE: "32G"
      CPU_CORES: "8"
      USERNAME: "Docker"
      PASSWORD: "admin"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - ./windows:/storage
      - /temp/windows-docker-shared-directory:/shared
    networks:
      vlan:
        ipv4_address: 192.168.0.100
    restart: always
    stop_grace_period: 2m

networks:
  vlan:
    external: true
